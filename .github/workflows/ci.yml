name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Lint
        run: |
          go vet ./...
          if [ -n "$(gofmt -l .)" ]; then echo "gofmt found issues:"; gofmt -l .; exit 1; fi

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Build
        run: go build -o bin/ghost-migrate ./cmd/ghost-migrate
